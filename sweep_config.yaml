method: grid
metric:
  name: rollout/ep_rew_mean
  goal: maximize
parameters:
  env_id:
    value: "CustomHopper-source-v0"
  policy:
    value: "MlpPolicy"

  # Seed
  seed:
    values: [42]

  # Training parameters
  total_timesteps:
    value: 100000 # Original is 1000000
  learning_starts:
    value: 10000
  train_freq:
    value: 1
  gradient_steps:
    value: 1
  batch_size:
    value: 256
  device:
    value: "auto"

  # Replay buffer
  buffer_size:
    value: 1000000

  # Policy network architecture
  policy_pi_layer1:
    value: 256
  policy_pi_layer2:
    value: 256
  policy_qf_layer1:
    value: 256
  policy_qf_layer2:
    value: 256
  policy_activation_fn:
    value: "ReLU"

  # Discount target network update
  gamma:
    value: 0.99
  tau:
    value: 0.005

  # Target network update
  target_update_interval:
    value: 1

  # Entropy
  ent_coef:
    value: "auto"
  target_entropy:
    value: "auto"
  
  #Verbose
  verbose:
    value: 1